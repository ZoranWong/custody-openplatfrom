# Nginx configuration for Cregis Custody OpenPlatform
# API Service: http://localhost:1000
# Developer Portal: /developer-openplatform/
# Admin Portal: /openplatform-admin/
# Auth Page: /openplatform/oauth/

server {
    listen 80;
    server_name _;

    root /web/custody-openplatform;
    index index.html;

    # Developer Portal (Vue SPA)
    location /developer-openplatform/ {
        alias /web/custody-openplatform/developer-portal/;
        try_files $uri $uri/ /developer-openplatform/index.html;
    }

    # Developer Portal root redirect
    location = /developer-openplatform {
        return 301 /developer-openplatform/;
    }

    # Admin Portal (Vue SPA)
    location /openplatform-admin/ {
        alias /web/custody-openplatform/admin-portal/;
        try_files $uri $uri/ /openplatform-admin/index.html;
    }

    # Admin Portal root redirect
    location = /openplatform-admin {
        return 301 /openplatform-admin/;
    }

    # Auth Page (Vue SPA)
    location /openplatform/oauth/ {
        alias /web/custody-openplatform/auth-page/;
        try_files $uri $uri/ /openplatform/oauth/index.html;
    }

    # Auth Page root redirect
    location = /openplatform/oauth {
        return 301 /openplatform/oauth/;
    }

    # API Service
    location /openplatform-api/ {
        proxy_pass http://localhost:1000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check
    location = /health {
        proxy_pass http://localhost:1000/health;
        access_log off;
    }
}
