name: Release Web SDK

on:
  # 手动触发（可选）
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch/minor/major) or specific version'
        required: true
        default: 'patch'

  # 自动触发：监听 GitHub release
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # 获取完整历史，用于版本更新
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Check npm version
        run: npm --version

      - name: Debug npm config
        run: |
          npm config list

      - name: Install dependencies
        working-directory: ./openplatform-sdk/web
        run: npm ci

      - name: Build
        working-directory: ./openplatform-sdk/web
        run: npm run build

      - name: Get version from GitHub release tag
        if: github.event_name == 'release'
        working-directory: ./openplatform-sdk/web
        run: |
          # 从 GitHub release tag 提取版本号 (e.g., v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm version $VERSION --no-git-tag-version

      - name: Get version from workflow dispatch
        if: github.event_name == 'workflow_dispatch'
        working-directory: ./openplatform-sdk/web
        run: |
          if [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
          else
            npm version ${{ github.event.inputs.version }}
          fi

      - name: Publish to npm
        working-directory: ./openplatform-sdk/web
        run: npm publish --access public --registry=https://registry.npmjs.org/

      - name: Update GitHub Release with npm version
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: `Published to npm: @cregis-kit/openplatform-webkit@${process.env.VERSION}\n\n${context.payload.release.body || ''}`
            })
