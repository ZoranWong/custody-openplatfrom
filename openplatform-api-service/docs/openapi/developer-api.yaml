    Unauthorized:
      description: 未认证或认证过期
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 40101
            message: "Invalid or expired token"
            trace_id: "abc123"

    Forbidden:
      description: 权限不足
