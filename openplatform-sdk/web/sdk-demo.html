<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cregis SDK Demo - SDK Integration Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #00be78 0%, #00a06a 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00be78;
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #00be78;
      color: white;
    }

    .btn-primary:hover {
      background: #00a06a;
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #6b7280;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result.success {
      background: #d1fae5;
      border: 1px solid #34d399;
      color: #065f46;
    }

    .result.error {
      background: #fee2e2;
      border: 1px solid #f87171;
      color: #991b1b;
    }

    .result h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .result pre {
      background: rgba(0, 0, 0, 0.1);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
    }

    .status {
      margin-top: 20px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: #6b7280;
      font-size: 14px;
    }

    .status-value {
      font-weight: 600;
      font-size: 14px;
    }

    .status-value.success {
      color: #00be78;
    }

    .status-value.pending {
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Cregis SDK Demo</h1>
      <p>测试 SDK 集成 - SDK Integration Test</p>
    </div>

    <div class="content">
      <div class="form-group">
        <label>App ID</label>
        <input type="text" id="appId" placeholder="输入你的 App ID" value="app-123">
      </div>

      <div class="form-group">
        <label>App Secret</label>
        <input type="text" id="appSecret" placeholder="输入你的 App Secret" value="test-secret-123">
      </div>

      <button class="btn btn-primary" id="generateTokenBtn">生成 AppToken</button>

      <div class="form-group" style="margin-top: 20px;">
        <label>App Token (自动生成)</label>
        <input type="text" id="appToken" placeholder="点击上方按钮生成" readonly>
      </div>

      <div class="form-group">
        <label>App Name (可选)</label>
        <input type="text" id="appName" placeholder="应用名称" value="测试应用">
      </div>

      <div class="form-group">
        <label>App Logo URL (可选)</label>
        <input type="text" id="appLogoUrl" placeholder="应用Logo URL" value="">
      </div>

      <div class="form-group">
        <label>Base URL (可选)</label>
        <input type="text" id="baseUrl" placeholder="默认: http://localhost:1002" value="http://localhost:1002">
      </div>

      <div class="form-group">
        <label>显示模式</label>
        <select id="mode" style="width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;">
          <option value="inline">内嵌模式 (inline)</option>
          <option value="popup" selected>弹框模式 (popup)</option>
        </select>
      </div>

      <button class="btn btn-primary" id="initBtn">初始化 SDK</button>
      <button class="btn btn-secondary" id="openAuthBtn" disabled>打开授权页面</button>

      <div class="result" id="result"></div>

      <!-- SDK 容器，用于显示授权页面 -->
      <div id="sdk-container" style="margin-top: 20px; height: 500px; border: 1px dashed #ccc; border-radius: 8px; display: none; overflow: hidden; position: relative;"></div>

      <!-- 弹框遮罩层 -->
      <div id="sdk-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 9999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 420px; height: 600px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);">
          <div id="sdk-modal-content" style="width: 100%; height: 100%;"></div>
          <button id="sdk-modal-close" style="position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border: none; background: #f3f4f6; border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 10;">×</button>
        </div>
      </div>

      <div class="status" id="status">
        <div class="status-item">
          <span class="status-label">SDK 初始化</span>
          <span class="status-value pending" id="sdkStatus">未初始化</span>
        </div>
        <div class="status-item">
          <span class="status-label">授权状态</span>
          <span class="status-value pending" id="authStatus">-</span>
        </div>
        <div class="status-item">
          <span class="status-label">Resource Key</span>
          <span class="status-value" id="authId">-</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 引入 md5 库 -->
  <script src="./node_modules/md5/dist/md5.min.js"></script>
  <script>
    // 确保 md5 可用
    var md5 = window.md5 || window.MD5;
  </script>

  <!-- 引入真实 SDK -->
  <script>
    // 动态加载 SDK
    function loadSDK() {
      return new Promise((resolve, reject) => {
        if (window.CregisWebSDK) {
          // UMD 构建使用 .default 或 .CregisWebSDK
          const SDK = window.CregisWebSDK.default || window.CregisWebSDK.CregisWebSDK || window.CregisWebSDK;
          resolve(SDK);
          return;
        }
        const script = document.createElement('script');
        script.src = './dist/index.umd.js';
        script.onload = () => {
          const SDK = window.CregisWebSDK.default || window.CregisWebSDK.CregisWebSDK || window.CregisWebSDK;
          resolve(SDK);
        };
        script.onerror = () => reject(new Error('Failed to load SDK'));
        document.head.appendChild(script);
      });
    }
  </script>

  <!-- Demo 代码 -->
  <script>
    // Demo 代码
    let sdk = null;

    const initBtn = document.getElementById('initBtn');
    const generateTokenBtn = document.getElementById('generateTokenBtn');
    const openAuthBtn = document.getElementById('openAuthBtn');
    const result = document.getElementById('result');
    const sdkStatus = document.getElementById('sdkStatus');
    const authStatus = document.getElementById('authStatus');
    const authId = document.getElementById('authId');

    function showResult(success, message, data) {
      result.className = 'result show ' + (success ? 'success' : 'error');
      result.innerHTML = `
        <h3>${success ? '✅ 成功' : '❌ 错误'}</h3>
        <p>${message}</p>
        ${data ? '<pre>' + JSON.stringify(data, null, 2) + '</pre>' : ''}
      `;
    }

    function updateStatus(element, text, type) {
      element.textContent = text;
      element.className = 'status-value ' + type;
    }

    // 生成 AppToken: md5(appId+appSecret+timestramp+nonce) + '-' + timestramp + '-' + nonce
    function generateAppToken(appId, appSecret) {
      const timestamp = Date.now().toString();
      const nonce = Math.random().toString(36).substring(2, 15);
      const hashInput = appId + appSecret + timestamp + nonce;
      const hash = md5(hashInput);
      const token = hash + '-' + timestamp + '-' + nonce;
      return token;
    }

    // 生成 AppToken 按钮
    generateTokenBtn.addEventListener('click', () => {
      const appId = document.getElementById('appId').value;
      const appSecret = document.getElementById('appSecret').value;

      if (!appId || !appSecret) {
        showResult(false, '请输入 App ID 和 App Secret');
        return;
      }

      const appToken = generateAppToken(appId, appSecret);
      document.getElementById('appToken').value = appToken;
      showResult(true, 'AppToken 生成成功！', { appToken });
    });

    // 初始化 SDK
    initBtn.addEventListener('click', async () => {
      const appId = document.getElementById('appId').value;
      const appSecret = document.getElementById('appSecret').value;
      const appToken = document.getElementById('appToken').value;
      const appName = document.getElementById('appName').value;
      const appLogoUrl = document.getElementById('appLogoUrl').value;
      const baseUrl = document.getElementById('baseUrl').value || 'http://localhost:1002';
      const mode = document.getElementById('mode').value;

      if (!appId) {
        showResult(false, '请输入 App ID');
        return;
      }

      // 如果没有生成 appToken，先生成
      let finalAppToken = appToken;
      if (!finalAppToken && appId && appSecret) {
        finalAppToken = generateAppToken(appId, appSecret);
        document.getElementById('appToken').value = finalAppToken;
      }

      try {
        // 加载 SDK
        const SDK = await loadSDK();

        // 创建 SDK 实例
        sdk = new SDK({
          appId: appId,
          baseUrl: baseUrl,
          container: '#sdk-container',
          appToken: finalAppToken,
          appName: appName || undefined,
          appLogoUrl: appLogoUrl || undefined,
          mode: mode,
          debug: true,
          onEvent: (event) => {
            console.log('SDK Event:', event);
            // 监听授权结果
            if (event.type === 'authorization_complete') {
              updateStatus(authStatus, '已授权', 'success');
              authId.textContent = event.data?.resourceKey || '-';
              showResult(true, '授权成功！', event.data);
            } else if (event.type === 'authorization_error') {
              updateStatus(authStatus, '失败', 'error');
              showResult(false, '授权失败', event.error);
            } else if (event.type === 'authorization_started') {
              // 授权流程开始
              updateStatus(authStatus, '授权中...', 'pending');
            }
          }
        });

        // 显示容器
        const container = document.getElementById('sdk-container');
        container.style.display = mode === 'inline' ? 'block' : 'none';

        // 更新状态
        updateStatus(sdkStatus, '已初始化', 'success');
        openAuthBtn.disabled = false;
        showResult(true, 'SDK 初始化成功！点击"打开授权页面"开始授权', { appId, baseUrl, appToken: finalAppToken, mode });

      } catch (error) {
        showResult(false, 'SDK 初始化失败: ' + error.message);
      }
    });

    // 打开授权页面
    openAuthBtn.addEventListener('click', async () => {
      if (!sdk || !sdk.isInitialized()) {
        showResult(false, '请先初始化 SDK');
        return;
      }

      openAuthBtn.disabled = true;
      openAuthBtn.textContent = '授权中...';

      try {
        // 打开授权页面 - SDK 会自动处理弹框或内嵌
        const result = await sdk.openAuthorization();

        // 更新状态
        updateStatus(authStatus, result.status === 'success' ? '已授权' : '失败', result.status === 'success' ? 'success' : 'error');
        authId.textContent = result.resourceKey || '-';

        if (result.status === 'success') {
          showResult(true, '授权成功！', result);
        } else {
          showResult(false, '授权失败', result.error);
        }

      } catch (error) {
        showResult(false, '授权错误: ' + error.message);
      } finally {
        openAuthBtn.disabled = false;
        openAuthBtn.textContent = '打开授权页面';
      }
    });

    console.log('🚀 Cregis SDK Demo 已加载');
    console.log('请查看控制台了解更多信息');
  </script>
</body>
</html>
